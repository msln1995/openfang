name: Build-Android-Binary
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Build Tools
        run: |
          sudo apt-get update
          # 编译 vendored openssl 必须有 perl, make 和 cmake
          sudo apt-get install -y pkg-config perl make cmake
          
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
          
      - name: Build Android Binary
        run: |
          # 1. 安装 ndk 编译辅助工具
          cargo install cargo-ndk
          
          # 2. 直接运行编译
          # 注意：因为已经在 Cargo.toml 里全局 patch 了 openssl-sys 
          # 且指定了 vendored，这里不需要再传额外的环境变量或 feature
          cargo ndk -t arm64-v8a build --release -p openfang-cli
          
      - name: Upload Finished Binary
        uses: actions/upload-artifact@v4
        with:
          name: openfang-android-arm64
          path: target/aarch64-linux-android/release/openfang-cli
