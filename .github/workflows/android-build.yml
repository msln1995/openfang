name: Build-Android-Binary
on: [push, workflow_dispatch] # 提交代码或手动点按钮都会触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config perl make
          
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
          
      - name: Build
        run: |
          cargo install cargo-ndk
          # 这里直接编译 CLI
          cargo ndk -t arm64-v8a build --release -p openfang-cli
          
      - name: Upload Finished Binary
        uses: actions/upload-artifact@v4
        with:
          name: openfang-android-arm64
          path: target/aarch64-linux-android/release/openfang-cli
